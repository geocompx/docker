name: Continuous Integration and Delivery

on:
  schedule:
    - cron: '0 0 * * 0' # Runs at 00:00 on Sunday every week
  push:
    branches:
      - 'master'
      - 'main'
  workflow_dispatch: # Allows manual triggering

jobs:
  minimal:
    uses: ./.github/workflows/build-docker.yml
    with:
      image: minimal
      dockerfile: minimal/Dockerfile
    secrets: inherit

  osgeo:
    uses: ./.github/workflows/build-docker.yml
    with:
      image: osgeo
      dockerfile: osgeo/Dockerfile
    secrets: inherit

  qgis:
    uses: ./.github/workflows/build-docker.yml
    with:
      image: qgis
      dockerfile: qgis/Dockerfile
    secrets: inherit

  python:
    uses: ./.github/workflows/build-docker.yml
    with:
      image: python
      dockerfile: python/Dockerfile
    secrets: inherit

  suggests:
    needs: minimal
    uses: ./.github/workflows/build-docker.yml
    with:
      image: suggests
      dockerfile: suggests/Dockerfile
    secrets: inherit

  latest:
    needs: minimal
    uses: ./.github/workflows/build-docker.yml
    with:
      image: latest
      dockerfile: Dockerfile
    secrets: inherit

  rocker-rpy:
    needs: minimal
    uses: ./.github/workflows/build-docker.yml
    with:
      image: rocker-rpy
      dockerfile: rocker-rpy/Dockerfile
    secrets: inherit

  pythonr:
    needs: python
    uses: ./.github/workflows/build-docker.yml
    with:
      image: pythonr
      dockerfile: pythonr/Dockerfile
    secrets: inherit

  buildbook:
    needs: suggests
    uses: ./.github/workflows/build-docker.yml
    with:
      image: buildbook
      dockerfile: buildbook/Dockerfile
    secrets: inherit

  rust:
    needs: suggests
    uses: ./.github/workflows/build-docker.yml
    with:
      image: rust
      dockerfile: rust/Dockerfile
    secrets: inherit

  rocker-rpyjl:
    needs: rocker-rpy
    uses: ./.github/workflows/build-docker.yml
    with:
      image: rocker-rpyjl
      dockerfile: rocker-rpyjl/Dockerfile
    secrets: inherit

  update-readme:
    needs: [minimal, osgeo, qgis, python, suggests, latest, rocker-rpy, pythonr, buildbook, rust, rocker-rpyjl]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' # Only run this on the scheduled run
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_FOR_PUSH }} # A PAT with repo scope is needed

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R dependencies
        run: R -e "install.packages(c('rmarkdown', 'gert'))"

      - name: Run cron script to update README.Rmd
        run: Rscript -e "rmarkdown::render('README.Rmd')"
        env:
          GITHUB_PAT: ${{ secrets.PAT_FOR_PUSH }}

      - name: Commit and push README.md
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "docs: render README.md from Rmd [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
